<!DOCTYPE html>
<html>
<head><title>Generate Reverie Icons</title></head>
<body style="background:#06001c;color:white;font-family:sans-serif;padding:40px;text-align:center;">
  <h2>Reverie Icon Generator</h2>
  <p style="opacity:0.6;margin-bottom:32px;">Click each button to download the icon.</p>
  <canvas id="c" style="display:none"></canvas>
  <div style="display:flex;gap:24px;justify-content:center;flex-wrap:wrap;">
    <button onclick="generate(192)" style="padding:14px 28px;background:#7c3aed;border:none;color:white;border-radius:12px;font-size:16px;cursor:pointer;">Download 192×192</button>
    <button onclick="generate(512)" style="padding:14px 28px;background:#7c3aed;border:none;color:white;border-radius:12px;font-size:16px;cursor:pointer;">Download 512×512</button>
  </div>
  <div id="preview" style="margin-top:32px;display:flex;gap:24px;justify-content:center;"></div>

  <script>
    function generate(size) {
      const canvas = document.getElementById('c');
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Background
      const bg = ctx.createLinearGradient(0, 0, size * 0.6, size);
      bg.addColorStop(0, '#06001c');
      bg.addColorStop(1, '#0d0225');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, size, size);

      const cx = size / 2, cy = size / 2;
      const r  = size * 0.36;

      // Outer glow
      const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 1.9);
      glow.addColorStop(0, 'rgba(124,58,237,0.22)');
      glow.addColorStop(1, 'rgba(124,58,237,0)');
      ctx.beginPath();
      ctx.arc(cx, cy, r * 1.9, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();

      // Orb
      const orb = ctx.createRadialGradient(cx - r * 0.24, cy - r * 0.2, 0, cx, cy, r);
      orb.addColorStop(0,    '#c084fc');
      orb.addColorStop(0.45, '#7c3aed');
      orb.addColorStop(1,    '#3b0764');
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fillStyle = orb;
      ctx.fill();

      // Highlight
      ctx.beginPath();
      ctx.ellipse(cx - r * 0.22, cy - r * 0.28, r * 0.28, r * 0.18, -0.3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fill();

      const link = document.createElement('a');
      link.download = `icon-${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();

      // Preview
      const img = document.createElement('img');
      img.src = canvas.toDataURL();
      img.width = img.height = 80;
      img.style.borderRadius = '16px';
      document.getElementById('preview').appendChild(img);
    }
  </script>
</body>
</html>
