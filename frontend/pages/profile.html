<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Reverie — Profile</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; display: block; }
    .result-box { background: var(--surface); border-radius: 14px; padding: 18px; margin-top: 14px; }
    .result-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .result-row:last-child { border-bottom: none; }
    .result-label { font-size: 14px; color: var(--text-dim); }
    .result-value { font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); }
  </style>
</head>
<body>
  <div class="app-frame">

    <div class="page-header">👤 Profile</div>

    <div class="main-content page-content">

      <!-- SLEEP SCHEDULE CALCULATOR -->
      <div class="section-label">Sleep Schedule</div>
      <div class="card">
        <div class="form-group">
          <label class="form-label">Your age</label>
          <input type="number" id="age-input" placeholder="e.g. 16" min="10" max="100" />
        </div>
        <div class="form-group">
          <label class="form-label">Wake-up time</label>
          <input type="time" id="wake-input" value="07:00" />
        </div>
        <button class="btn btn-primary" onclick="calculateSchedule()">Calculate My Bedtime</button>

        <div id="schedule-result" style="display:none;">
          <div class="result-box" style="margin-top:16px;">
            <div class="result-row">
              <span class="result-label">Recommended bedtime</span>
              <span class="result-value" id="bedtime-result">—</span>
            </div>
            <div class="result-row">
              <span class="result-label">Target sleep</span>
              <span class="result-value" id="hours-result">—</span>
            </div>
          </div>
          <div class="ai-response" style="margin-top:12px;">
            <div class="ai-label">💡 Gemini tip</div>
            <div class="ai-text" id="gemini-tip" style="font-size:14px;"></div>
          </div>
        </div>
      </div>

      <!-- USER INFO -->
      <div class="section-label" style="margin-top:8px;">Account</div>
      <div class="card">
        <div class="result-row">
          <span class="result-label">Name</span>
          <span class="result-value">Gemmy</span>
        </div>
        <div class="result-row">
          <span class="result-label">Dreams logged</span>
          <span class="result-value">3</span>
        </div>
        <div class="result-row">
          <span class="result-label">Current streak</span>
          <span class="result-value">🔥 4 nights</span>
        </div>
        <div class="result-row">
          <span class="result-label">Plan</span>
          <span class="result-value" style="color:var(--gold);">Free</span>
        </div>
      </div>

      <!-- Firebase Auth placeholder -->
      <div class="ai-response" style="margin-top: 4px;">
        <div class="ai-label">Coming in Week 3</div>
        <div class="ai-text" style="font-size:14px; color:var(--text-muted);">Login / signup with Firebase Authentication. Your dreams and sleep data will sync across devices.</div>
      </div>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <div class="nav-group">
        <a class="nav-link" href="../index.html">Home</a>
        <a class="nav-link" href="dreams.html">Dreams</a>
      </div>
      <a class="nav-plus" href="journal.html">+</a>
      <div class="nav-group">
        <a class="nav-link" href="winddown.html">Wind Down</a>
        <a class="nav-link active" href="profile.html">Profile</a>
      </div>
    </nav>

  </div>

  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script>
    async function calculateSchedule() {
      const age = parseInt(document.getElementById('age-input').value);
      const wakeTime = document.getElementById('wake-input').value;

      if (!age || !wakeTime) { alert('Please fill in your age and wake time.'); return; }

      // Rule-based calculation (no API needed)
      const recommendedHours = age <= 24 ? 9 : age <= 64 ? 8 : 7;

      const [wakeH, wakeM] = wakeTime.split(':').map(Number);
      let bedH = wakeH - recommendedHours;
      if (bedH < 0) bedH += 24;
      const bedtime = `${bedH % 12 || 12}:${String(wakeM).padStart(2,'0')} ${bedH < 12 ? 'AM' : 'PM'}`;

      document.getElementById('bedtime-result').textContent = bedtime;
      document.getElementById('hours-result').textContent = `${recommendedHours} hours`;

      // Try Gemini tip, fall back to static
      try {
        const result = await getSleepSchedule(age, wakeTime);
        document.getElementById('gemini-tip').textContent = result.tip;
      } catch {
        const tips = [
          'Try dimming your lights 30 minutes before your target bedtime — it signals your brain that sleep is coming.',
          'Avoid screens in the last hour before bed. Even a few minutes of blue light can delay melatonin.',
          'A consistent bedtime, even on weekends, is the single most effective thing you can do for sleep quality.'
        ];
        document.getElementById('gemini-tip').textContent = tips[Math.floor(Math.random() * tips.length)];
      }

      document.getElementById('schedule-result').style.display = 'block';
    }
  </script>
</body>
</html>
