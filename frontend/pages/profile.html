<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Reverie — Profile</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 13px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; display: block; }
    .result-box { background: var(--surface); border-radius: 14px; padding: 18px; margin-top: 14px; }
    .result-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .result-row:last-child { border-bottom: none; }
    .result-label { font-size: 14px; color: var(--text-dim); }
    .result-value { font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 800; color: var(--text); }
  </style>
</head>
<body>
  <div class="app-frame">

    <div class="page-header">👤 Profile</div>

    <div class="main-content page-content">

      <!-- SLEEP SCHEDULE CALCULATOR -->
      <div class="section-label">Sleep Schedule</div>
      <div class="card">
        <div class="form-group">
          <label class="form-label">Your age</label>
          <input type="number" id="age-input" placeholder="e.g. 16" min="10" max="100" />
        </div>
        <div class="form-group">
          <label class="form-label">Wake-up time</label>
          <input type="time" id="wake-input" value="07:00" />
        </div>
        <button class="btn btn-primary" onclick="calculateSchedule()">Calculate My Bedtime</button>

        <div id="schedule-result" style="display:none;">
          <div class="result-box" style="margin-top:16px;">
            <div class="result-row">
              <span class="result-label">Recommended bedtime</span>
              <span class="result-value" id="bedtime-result">—</span>
            </div>
            <div class="result-row">
              <span class="result-label">Target sleep</span>
              <span class="result-value" id="hours-result">—</span>
            </div>
          </div>
          <div class="ai-response" style="margin-top:12px;">
            <div class="ai-label">💡 Gemini tip</div>
            <div class="ai-text" id="gemini-tip" style="font-size:14px;"></div>
          </div>
        </div>
      </div>

      <!-- USER INFO -->
      <div class="section-label" style="margin-top:8px;">Account</div>
      <div class="card">
        <div class="result-row">
          <span class="result-label">Name</span>
          <span class="result-value" id="profile-name">—</span>
        </div>
        <div class="result-row">
          <span class="result-label">Email</span>
          <span class="result-value" id="profile-email" style="font-size:14px; word-break:break-all;">—</span>
        </div>
        <div class="result-row">
          <span class="result-label">Dreams logged</span>
          <span class="result-value" id="profile-dreams">—</span>
        </div>
        <div class="result-row">
          <span class="result-label">Current streak</span>
          <span class="result-value" id="profile-streak">—</span>
        </div>
        <div class="result-row">
          <span class="result-label">Plan</span>
          <span class="result-value" style="color:var(--gold);">Free</span>
        </div>
      </div>

      <!-- PREFERENCES -->
      <div class="section-label" style="margin-top:8px;">Preferences</div>
      <div class="card">
        <div class="result-row">
          <span class="result-label">Sleep type</span>
          <span class="result-value" id="profile-chronotype">—</span>
        </div>
        <div class="result-row">
          <span class="result-label">Goal</span>
          <span class="result-value" id="profile-goal">—</span>
        </div>
        <div class="result-row">
          <span class="result-label">Wake time</span>
          <span class="result-value" id="profile-waketime">—</span>
        </div>
      </div>

      <button class="btn" id="signout-btn" style="margin-top:8px; width:100%; background:rgba(255,255,255,0.06); color:var(--text-dim); box-shadow:none;">Sign Out</button>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <div class="nav-group">
        <a class="nav-link" href="../index.html">Home</a>
        <a class="nav-link" href="dreams.html">Dreams</a>
      </div>
      <a class="nav-plus" href="journal.html">+</a>
      <div class="nav-group">
        <a class="nav-link" href="winddown.html">Wind Down</a>
        <a class="nav-link active" href="profile.html">Profile</a>
      </div>
    </nav>

  </div>

  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script type="module">
    import { requireAuth, logOut } from '../js/auth.js';
    import { getUserProfile, getDreams } from '../js/firebase.js';

    const chronotypeLabel = { early: 'Early bird', middle: 'In between', night: 'Night owl' };
    const goalLabel = {
      dreams:   'Understand my dreams',
      sleep:    'Sleep better',
      patterns: 'Find emotional patterns',
      all:      'All of the above'
    };

    function computeStreak(dreams) {
      if (!dreams.length) return 0;
      const days = new Set(dreams.map(d => {
        const ts = d.createdAt;
        const date = ts?.toDate ? ts.toDate() : new Date(ts);
        return date.toDateString();
      }));
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);
      const start = days.has(today.toDateString())     ? new Date(today)
                  : days.has(yesterday.toDateString()) ? new Date(yesterday)
                  : null;
      if (!start) return 0;
      let streak = 0;
      const check = new Date(start);
      while (days.has(check.toDateString())) {
        streak++;
        check.setDate(check.getDate() - 1);
      }
      return streak;
    }

    requireAuth(async user => {
      const [profile, dreams] = await Promise.all([
        getUserProfile(user.uid),
        getDreams(user.uid)
      ]);

      document.getElementById('profile-name').textContent      = user.displayName || profile?.name || '—';
      document.getElementById('profile-email').textContent     = user.email || '—';
      document.getElementById('profile-dreams').textContent    = dreams.length;
      const streak = computeStreak(dreams);
      document.getElementById('profile-streak').textContent    = streak > 0 ? `🔥 ${streak} night${streak !== 1 ? 's' : ''}` : '—';
      document.getElementById('profile-chronotype').textContent = chronotypeLabel[profile?.chronotype] || '—';
      document.getElementById('profile-goal').textContent      = goalLabel[profile?.goal] || '—';
      document.getElementById('profile-waketime').textContent  = profile?.wakeTime || '—';

      if (profile?.wakeTime) {
        document.getElementById('wake-input').value = profile.wakeTime;
      }
    });

    document.getElementById('signout-btn').addEventListener('click', () => logOut());

    window.calculateSchedule = async function () {
      const age      = parseInt(document.getElementById('age-input').value);
      const wakeTime = document.getElementById('wake-input').value;
      if (!age || !wakeTime) { alert('Please fill in your age and wake time.'); return; }

      const recommendedHours = age <= 24 ? 9 : age <= 64 ? 8 : 7;
      const [wakeH, wakeM] = wakeTime.split(':').map(Number);
      let bedH = wakeH - recommendedHours;
      if (bedH < 0) bedH += 24;
      const bedtime = `${bedH % 12 || 12}:${String(wakeM).padStart(2,'0')} ${bedH < 12 ? 'AM' : 'PM'}`;

      document.getElementById('bedtime-result').textContent = bedtime;
      document.getElementById('hours-result').textContent   = `${recommendedHours} hours`;

      try {
        const result = await window.getSleepSchedule(age, wakeTime);
        document.getElementById('gemini-tip').textContent = result.tip;
      } catch {
        const tips = [
          'Try dimming your lights 30 minutes before your target bedtime — it signals your brain that sleep is coming.',
          'Avoid screens in the last hour before bed. Even a few minutes of blue light can delay melatonin.',
          'A consistent bedtime, even on weekends, is the single most effective thing you can do for sleep quality.'
        ];
        document.getElementById('gemini-tip').textContent = tips[Math.floor(Math.random() * tips.length)];
      }

      document.getElementById('schedule-result').style.display = 'block';
    };
  </script>
</body>
</html>
