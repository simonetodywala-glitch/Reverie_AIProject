<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Reverie — Insights</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    /* ── SLEEP CHART ── */
    .sleep-chart-wrap {
      background: var(--surface); border-radius: 18px;
      padding: 18px 16px 14px; margin-top: 8px;
    }
    .sleep-chart-header {
      display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px;
    }
    .sleep-avg {
      font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 28px; color: var(--text);
    }
    .sleep-avg-label { font-size: 12px; color: var(--text-muted); margin-left: 4px; }
    .sleep-avg-sub   { font-size: 12px; color: var(--text-muted); }
    .sleep-bars {
      display: flex; align-items: flex-end; gap: 6px;
      height: 90px; padding-bottom: 24px; position: relative;
    }
    .sleep-bar-col {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end; height: 100%;
    }
    .sleep-bar {
      width: 100%; border-radius: 6px 6px 3px 3px;
      background: linear-gradient(180deg, var(--accent), rgba(124,58,237,0.4));
      transition: height 0.5s cubic-bezier(0.34,1.2,0.64,1);
      min-height: 3px;
    }
    .sleep-bar.today { background: linear-gradient(180deg, #a78bfa, var(--accent)); }
    .sleep-bar.short { background: linear-gradient(180deg, #f87171, rgba(248,113,113,0.4)); }
    .sleep-bar-label {
      font-size: 10px; color: var(--text-muted); margin-top: 5px;
      text-align: center; position: absolute; bottom: 0;
    }
    .sleep-bar-hrs {
      font-size: 10px; color: var(--text-muted); margin-bottom: 3px;
    }
    .sleep-goal-line {
      position: absolute; left: 0; right: 0;
      border-top: 1px dashed rgba(155,93,229,0.35);
      pointer-events: none;
    }
    .sleep-goal-tag {
      position: absolute; right: 0; font-size: 9px;
      color: rgba(155,93,229,0.6); top: -12px;
    }
    .sleep-stats-row {
      display: flex; gap: 10px; margin-top: 14px;
    }
    .sleep-stat {
      flex: 1; background: rgba(255,255,255,0.04);
      border-radius: 12px; padding: 10px 12px; text-align: center;
    }
    .sleep-stat-val  { font-size: 18px; font-weight: 800; color: var(--text); font-family: 'Nunito', sans-serif; }
    .sleep-stat-lbl  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .sleep-empty {
      text-align: center; padding: 32px 0; color: var(--text-muted); font-size: 14px;
    }

    /* ── CHAT ── */
    .chat-window {
      display: flex; flex-direction: column; gap: 10px;
      padding: 14px 0; min-height: 180px; max-height: 320px;
      overflow-y: auto;
    }
    .chat-window::-webkit-scrollbar { width: 3px; }
    .chat-window::-webkit-scrollbar-thumb { background: rgba(155,93,229,0.3); border-radius: 4px; }
    .msg { max-width: 86%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.55; }
    .msg-user { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg-ai   { background: var(--surface); color: var(--text-dim); align-self: flex-start; border-bottom-left-radius: 4px; }
    .chat-input-row { display: flex; gap: 8px; margin-top: 10px; }
    .chat-input-row textarea {
      flex: 1; border-radius: 14px; padding: 10px 14px;
      font-size: 13.5px; resize: none;
      background: var(--surface); border: 1px solid rgba(255,255,255,0.08);
      color: var(--text); font-family: 'DM Sans', sans-serif; outline: none;
      transition: border-color 0.2s;
    }
    .chat-input-row textarea:focus { border-color: rgba(155,93,229,0.5); }
    .send-btn {
      width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
      background: var(--accent); color: #fff; border: none;
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, transform 0.15s;
    }
    .send-btn:hover  { background: var(--accent-soft); }
    .send-btn:active { transform: scale(0.9); }
    .send-btn:disabled { opacity: 0.35; cursor: default; }
  </style>
</head>
<body>
  <div class="app-frame">

    <div class="page-header">🔮 Insights</div>

    <div class="main-content page-content">

      <!-- SLEEP DASHBOARD -->
      <div class="section-label">Sleep this week</div>
      <div class="sleep-chart-wrap" id="sleep-chart-wrap">
        <div class="sleep-empty">Loading sleep data…</div>
      </div>

      <!-- CHAT -->
      <div class="section-label" style="margin-top:24px;">Ask Reverie anything</div>
      <div class="card" style="padding:16px;">
        <div class="chat-window" id="chat-window">
          <div class="msg msg-ai">Hey! Ask me anything about your dreams or sleep — I'll use your journal to personalise my answers. 🌙</div>
        </div>
        <div class="chat-input-row">
          <textarea id="chat-input" placeholder="Why do I keep dreaming about water?" rows="1"></textarea>
          <button class="send-btn" id="send-btn" onclick="sendMessage()">↑</button>
        </div>
      </div>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <div class="nav-group">
        <a class="nav-link" href="../index.html">Home</a>
        <a class="nav-link" href="dreams.html">Dreams</a>
      </div>
      <a class="nav-plus" href="journal.html">+</a>
      <div class="nav-group">
        <a class="nav-link active" href="insights.html">Insights</a>
        <a class="nav-link" href="profile.html">Profile</a>
      </div>
    </nav>

  </div>

  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getRecentSleepLogs } from '../js/firebase.js';

    const GOAL_HRS = 8;
    const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    function fmt(h) { return h % 1 === 0 ? `${h}h` : `${Math.floor(h)}h${Math.round((h%1)*60)}m`; }

    function renderChart(logs) {
      const wrap = document.getElementById('sleep-chart-wrap');

      if (!logs.length) {
        wrap.innerHTML = `<div class="sleep-empty">No sleep logged yet.<br>Use Wind Down to start tracking.</div>`;
        return;
      }

      // Build a map of the last 7 calendar days
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        days.push({ label: DAYS[d.getDay()], date: d.toDateString(), hrs: null });
      }

      logs.forEach(log => {
        const d = log.date ? new Date(log.date) : (log.createdAt?.toDate ? log.createdAt.toDate() : new Date(log.createdAt));
        const key = d.toDateString();
        const entry = days.find(x => x.date === key);
        if (entry && log.hoursSlept) entry.hrs = parseFloat(log.hoursSlept);
      });

      const logged   = days.filter(d => d.hrs !== null);
      const avg      = logged.length ? (logged.reduce((s, d) => s + d.hrs, 0) / logged.length) : 0;
      const best     = logged.length ? Math.max(...logged.map(d => d.hrs)) : 0;
      const maxBar   = Math.max(GOAL_HRS + 1, best + 0.5);
      const goalPct  = (GOAL_HRS / maxBar) * 66; // 66px = usable bar height

      const bars = days.map((d, i) => {
        if (d.hrs === null) {
          return `<div class="sleep-bar-col">
            <div class="sleep-bar-hrs" style="opacity:0.2;">—</div>
            <div class="sleep-bar" style="height:3px; opacity:0.15;"></div>
            <div class="sleep-bar-label" style="bottom:0;">${d.label}</div>
          </div>`;
        }
        const pct   = (d.hrs / maxBar) * 66;
        const cls   = i === 6 ? 'today' : d.hrs < 6 ? 'short' : '';
        return `<div class="sleep-bar-col">
          <div class="sleep-bar-hrs">${fmt(d.hrs)}</div>
          <div class="sleep-bar ${cls}" style="height:${pct}px;"></div>
          <div class="sleep-bar-label" style="bottom:0;">${d.label}</div>
        </div>`;
      }).join('');

      const streak = (() => {
        let s = 0;
        for (let i = days.length - 1; i >= 0; i--) {
          if (days[i].hrs !== null) s++; else break;
        }
        return s;
      })();

      wrap.innerHTML = `
        <div class="sleep-chart-header">
          <div>
            <span class="sleep-avg">${avg ? fmt(avg) : '—'}</span>
            <span class="sleep-avg-label">avg / night</span>
          </div>
          <div class="sleep-avg-sub">last ${logged.length} night${logged.length !== 1 ? 's' : ''}</div>
        </div>
        <div class="sleep-bars">
          <div class="sleep-goal-line" style="bottom:${goalPct + 24}px;">
            <span class="sleep-goal-tag">goal</span>
          </div>
          ${bars}
        </div>
        <div class="sleep-stats-row">
          <div class="sleep-stat">
            <div class="sleep-stat-val">${best ? fmt(best) : '—'}</div>
            <div class="sleep-stat-lbl">Best night</div>
          </div>
          <div class="sleep-stat">
            <div class="sleep-stat-val">${streak}</div>
            <div class="sleep-stat-lbl">Day streak</div>
          </div>
          <div class="sleep-stat">
            <div class="sleep-stat-val">${avg >= GOAL_HRS ? '✓' : avg ? fmt(GOAL_HRS - avg) : '—'}</div>
            <div class="sleep-stat-lbl">${avg >= GOAL_HRS ? 'Goal met' : 'Below goal'}</div>
          </div>
        </div>`;
    }

    // ── CHAT ──
    let currentUser = null;
    let chatHistory = [];

    function addMessage(text, role) {
      const win = document.getElementById('chat-window');
      const div = document.createElement('div');
      div.className = `msg msg-${role}`;
      div.textContent = text;
      win.appendChild(div);
      win.scrollTop = win.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const text  = input.value.trim();
      if (!text) return;
      input.value = '';

      addMessage(text, 'user');
      chatHistory.push({ role: 'user', content: text });

      const btn = document.getElementById('send-btn');
      btn.disabled = true;
      const typing = addMessage('···', 'ai');

      try {
        const { reply } = await sendChatMessage(
          currentUser?.uid || 'anonymous',
          text,
          null,
          chatHistory.slice(0, -1)
        );
        typing.textContent = reply;
        chatHistory.push({ role: 'assistant', content: reply });
      } catch {
        typing.textContent = "Sorry, I couldn't connect right now. Try again in a moment.";
        chatHistory.pop();
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('chat-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    window.sendMessage = sendMessage;

    requireAuth(async user => {
      currentUser = user;
      const logs = await getRecentSleepLogs(user.uid).catch(() => []);
      renderChart(logs);
    });
  </script>
</body>
</html>
