<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Reverie — Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,700;0,800;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      background: linear-gradient(160deg, #06001c 0%, #0d0225 100%);
      font-family: 'Nunito', sans-serif;
      color: #f0e8ff;
      overflow-x: hidden;
    }

    .story-wrap {
      max-width: 360px;
      margin: 0 auto;
      padding: 72px 28px 180px;
      min-height: 100vh;
    }

    .story-block {
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp 0.35s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .story-line {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.4;
      color: #f0e8ff;
      min-height: 1em;
      letter-spacing: -0.01em;
    }

    .story-line.dim {
      color: rgba(240, 232, 255, 0.38);
      font-size: 20px;
      font-weight: 700;
      margin-top: 4px;
    }

    .story-spacer { height: 20px; }

    .answer-inline {
      color: #c084fc;
      font-weight: 900;
    }

    /* ── INPUT ── */
    .input-area {
      margin-top: 18px;
      animation: fadeUp 0.3s ease forwards;
    }

    .story-input {
      background: rgba(255, 255, 255, 0.06);
      border: 1.5px solid rgba(155, 93, 229, 0.35);
      border-radius: 14px;
      padding: 14px 18px;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 20px;
      font-weight: 700;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .story-input:focus { border-color: rgba(155, 93, 229, 0.75); }
    .story-input::placeholder { color: rgba(255,255,255,0.22); font-weight: 400; }

    .continue-btn {
      margin-top: 12px;
      width: 100%;
      padding: 14px;
      border-radius: 100px;
      background: rgba(124, 58, 237, 0.22);
      border: 1px solid rgba(155, 93, 229, 0.4);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.2s;
    }
    .continue-btn:active { background: rgba(124, 58, 237, 0.42); }

    /* ── CHOICES ── */
    .choices {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      animation: fadeUp 0.3s ease forwards;
    }

    .choice-btn {
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 14px;
      padding: 15px 18px;
      color: rgba(240, 232, 255, 0.85);
      font-family: 'Nunito', sans-serif;
      font-size: 17px;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .choice-btn:active {
      background: rgba(124, 58, 237, 0.28);
      border-color: rgba(155, 93, 229, 0.55);
      transform: scale(0.98);
    }

    /* ── AUTH ── */
    .auth-area { margin-top: 8px; }

    .auth-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 15px 18px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color 0.2s;
      -webkit-appearance: none;
      appearance: none;
    }
    .auth-input:focus { border-color: rgba(155, 93, 229, 0.5); }
    .auth-input::placeholder { color: rgba(255,255,255,0.28); }

    .primary-btn {
      width: 100%;
      padding: 16px;
      border-radius: 100px;
      background: linear-gradient(135deg, #7c3aed, #9b5de5);
      border: none;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 6px 28px rgba(124,58,237,0.4);
      letter-spacing: -0.01em;
      transition: transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .primary-btn:active { transform: scale(0.97); }

    .or-divider {
      text-align: center;
      color: rgba(255,255,255,0.28);
      font-size: 13px;
      margin: 14px 0;
    }

    .google-btn {
      width: 100%;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 14px 18px;
      color: rgba(240,232,255,0.9);
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .google-btn:active { background: rgba(255,255,255,0.12); }

    .switch-link {
      text-align: center;
      color: rgba(255,255,255,0.36);
      font-size: 14px;
      margin-top: 18px;
    }
    .switch-link span {
      color: #c084fc;
      font-weight: 700;
      cursor: pointer;
    }

    .error-msg {
      color: #f87171;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
      min-height: 20px;
    }
  </style>
</head>
<body>
<div class="story-wrap" id="story"></div>

<script type="module">
  import { signUp, logIn, signInWithGoogle, auth } from '../js/auth.js';
  import { saveUserProfile } from '../js/firebase.js';
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const collected = {};
  const storyEl = document.getElementById('story');

  const sleep = ms => new Promise(r => setTimeout(r, ms));

  function scrollDown() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
  }

  function newBlock() {
    const b = document.createElement('div');
    b.className = 'story-block';
    storyEl.appendChild(b);
    return b;
  }

  async function typeLine(el, text, speed = 28) {
    for (const ch of text) {
      el.textContent += ch;
      await sleep(speed);
    }
  }

  async function showLines(lines) {
    const block = newBlock();
    for (const line of lines) {
      if (line === '') {
        const sp = document.createElement('div');
        sp.className = 'story-spacer';
        block.appendChild(sp);
        await sleep(180);
        continue;
      }
      const dim = line.startsWith('~');
      const text = dim ? line.slice(1) : line;
      const p = document.createElement('p');
      p.className = 'story-line' + (dim ? ' dim' : '');
      block.appendChild(p);
      scrollDown();
      await sleep(80);
      await typeLine(p, text, dim ? 22 : 28);
    }
    scrollDown();
  }

  async function askText(sentence, key, placeholder, inputType = 'text', defaultVal = '') {
    const block = newBlock();

    const p = document.createElement('p');
    p.className = 'story-line';
    block.appendChild(p);
    scrollDown();
    await typeLine(p, sentence + ' ');

    const blank = document.createElement('span');
    blank.style.cssText = 'color: rgba(192,132,252,0.35); font-weight:900;';
    blank.textContent = '___';
    p.appendChild(blank);

    const area = document.createElement('div');
    area.className = 'input-area';

    const input = document.createElement('input');
    input.type = inputType;
    input.className = 'story-input';
    input.placeholder = placeholder;
    if (defaultVal) input.value = defaultVal;
    area.appendChild(input);

    const btn = document.createElement('button');
    btn.className = 'continue-btn';
    btn.textContent = 'Continue →';
    area.appendChild(btn);

    block.appendChild(area);
    await sleep(40);
    scrollDown();
    input.focus();

    return new Promise(resolve => {
      const submit = () => {
        const raw = input.value.trim() || input.value;
        if (!raw) { input.focus(); return; }
        collected[key] = raw;

        const display = inputType === 'time' ? formatTime(raw) : raw;
        blank.textContent = display;
        blank.style.cssText = 'color: #c084fc; font-weight:900;';
        area.remove();
        scrollDown();
        resolve(raw);
      };
      btn.onclick = submit;
      input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    });
  }

  async function askChoice(sentence, key, options) {
    const block = newBlock();

    const p = document.createElement('p');
    p.className = 'story-line';
    block.appendChild(p);
    scrollDown();
    await typeLine(p, sentence + ' ');

    const blank = document.createElement('span');
    blank.style.cssText = 'color: rgba(192,132,252,0.35); font-weight:900;';
    blank.textContent = '___';
    p.appendChild(blank);

    const choices = document.createElement('div');
    choices.className = 'choices';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = opt.label;
      choices.appendChild(btn);
    });
    block.appendChild(choices);
    await sleep(40);
    scrollDown();

    return new Promise(resolve => {
      choices.querySelectorAll('.choice-btn').forEach((btn, i) => {
        btn.onclick = () => {
          collected[key] = options[i].value;
          blank.textContent = options[i].label;
          blank.style.cssText = 'color: #c084fc; font-weight:900;';
          choices.remove();
          scrollDown();
          resolve(options[i].value);
        };
      });
    });
  }

  function formatTime(val) {
    if (!val) return val;
    const [h, m] = val.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    return `${h12}:${String(m).padStart(2, '0')} ${ampm}`;
  }

  async function showAuth(isSignIn = false) {
    const block = newBlock();
    block.style.marginTop = '12px';

    const area = document.createElement('div');
    area.className = 'auth-area';

    const signupDiv = document.createElement('div');
    signupDiv.innerHTML = `
      <input class="auth-input" type="email" id="ob-email" placeholder="Email address" autocomplete="email" />
      <input class="auth-input" type="password" id="ob-pw" placeholder="Password" autocomplete="new-password" />
      <button class="primary-btn" id="ob-signup-btn">Start Dreaming 🌙</button>
      <div class="or-divider">or</div>
      <button class="google-btn" id="ob-google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 6.294C4.672 4.167 6.656 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>
      <div class="switch-link">Already have an account? <span id="ob-to-signin">Sign in</span></div>
      <div class="error-msg" id="ob-err"></div>
    `;

    const signinDiv = document.createElement('div');
    signinDiv.style.display = 'none';
    signinDiv.innerHTML = `
      <input class="auth-input" type="email" id="ob-si-email" placeholder="Email address" autocomplete="email" />
      <input class="auth-input" type="password" id="ob-si-pw" placeholder="Password" autocomplete="current-password" />
      <button class="primary-btn" id="ob-signin-btn">Sign In →</button>
      <div class="or-divider">or</div>
      <button class="google-btn" id="ob-google-btn-2">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 6.294C4.672 4.167 6.656 3.58 9 3.58z"/></svg>
        Continue with Google
      </button>
      <div class="switch-link">New to Reverie? <span id="ob-to-signup">Create account</span></div>
      <div class="error-msg" id="ob-err-2"></div>
    `;

    area.appendChild(signupDiv);
    area.appendChild(signinDiv);
    block.appendChild(area);
    scrollDown();

    if (isSignIn) {
      signupDiv.style.display = 'none';
      signinDiv.style.display = 'block';
    }

    const finish = () => {
      localStorage.setItem('reverie_onboarded', 'true');
      window.location.href = '../index.html';
    };

    document.getElementById('ob-signup-btn').onclick = async () => {
      const email = document.getElementById('ob-email').value.trim();
      const pw    = document.getElementById('ob-pw').value;
      if (!email || !pw) return;
      try {
        await signUp(collected.name || '', email, pw, { goal: collected.goal, wakeTime: collected.bedtime });
        finish();
      } catch (e) { document.getElementById('ob-err').textContent = e.message; }
    };

    document.getElementById('ob-google-btn').onclick = async () => {
      try {
        const user = await signInWithGoogle();
        await saveUserProfile(user.uid, { name: collected.name, goal: collected.goal, wakeTime: collected.bedtime });
        finish();
      } catch (e) { document.getElementById('ob-err').textContent = e.message; }
    };

    document.getElementById('ob-signin-btn').onclick = async () => {
      const email = document.getElementById('ob-si-email').value.trim();
      const pw    = document.getElementById('ob-si-pw').value;
      if (!email || !pw) return;
      try {
        await logIn(email, pw);
        finish();
      } catch (e) { document.getElementById('ob-err-2').textContent = e.message; }
    };

    document.getElementById('ob-google-btn-2').onclick = async () => {
      try {
        await signInWithGoogle();
        finish();
      } catch (e) { document.getElementById('ob-err-2').textContent = e.message; }
    };

    document.getElementById('ob-to-signin').onclick = () => {
      signupDiv.style.display = 'none';
      signinDiv.style.display = 'block';
    };

    document.getElementById('ob-to-signup').onclick = () => {
      signinDiv.style.display = 'none';
      signupDiv.style.display = 'block';
    };
  }

  // ── STORY FLOW ──
  async function runStory() {
    await sleep(500);

    await showLines([
      "Some people never remember their dreams.",
      "",
      "You do.",
      "",
      "~That's why you're here."
    ]);

    await sleep(700);

    await askText("Your name is", 'name', 'your name');

    await sleep(500);

    await showLines([`Nice to meet you, ${collected.name}.`]);

    await sleep(600);

    await askChoice("You're here because you want to", 'goal', [
      { value: 'understand', label: 'understand my dreams' },
      { value: 'sleep',      label: 'sleep better' },
      { value: 'nightmares', label: 'stop my nightmares' },
      { value: 'lucid',      label: 'have lucid dreams' },
    ]);

    await sleep(500);

    const goalResponse = {
      understand: ["Dreams are your mind processing the world.", "", "~Let's decode them."],
      sleep:      ["Good sleep changes everything.", "", "~We can help with that."],
      nightmares: ["You don't have to dread closing your eyes.", "", "~There's a way through."],
      lucid:      ["You can learn to wake up inside your dreams.", "", "~It's a real skill. Let's build it."],
    };
    await showLines(goalResponse[collected.goal] || ["You came to the right place."]);

    await sleep(700);

    await askText("You usually fall asleep around", 'bedtime', '11:00 PM', 'time', '23:00');

    await sleep(500);

    await askChoice("In the morning, you remember your dreams", 'recall', [
      { value: 'never',     label: 'almost never' },
      { value: 'sometimes', label: 'sometimes' },
      { value: 'often',     label: 'pretty often' },
    ]);

    await sleep(400);

    const recallResponse = {
      never:     ["That's very common.", "", "~We can fix that."],
      sometimes: ["There's more in there.", "", "~Let's find it."],
      often:     ["You're already halfway there.", ""],
    };
    await showLines(recallResponse[collected.recall] || [""]);

    await sleep(500);

    await showLines([
      `Reverie is ready for you, ${collected.name}.`,
      "",
      "~Create your account to begin."
    ]);

    await sleep(300);
    await showAuth(false);
  }

  async function runSignInOnly() {
    await sleep(400);
    await showLines(["Welcome back.", "", "~Sign in to continue."]);
    await sleep(300);
    await showAuth(true);
  }

  // ── INIT ──
  const isSignInMode = new URLSearchParams(window.location.search).get('signin') === '1';

  onAuthStateChanged(auth, user => {
    if (user && localStorage.getItem('reverie_onboarded') === 'true') {
      window.location.href = '../index.html';
    } else if (isSignInMode) {
      runSignInOnly();
    } else {
      runStory();
    }
  });
</script>
</body>
</html>
