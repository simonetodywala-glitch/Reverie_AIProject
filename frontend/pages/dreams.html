<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Reverie — Dreams</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .filter-wrapper { position: relative; display: flex; align-items: center; padding: 0 0 16px; }
    .filter-arrow {
      flex-shrink: 0;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-dim);
      transition: background 0.2s, color 0.2s;
      z-index: 1;
      user-select: none;
    }
    .filter-arrow:hover { background: var(--accent-soft); color: #fff; }
    .filter-arrow.hidden { opacity: 0; pointer-events: none; }
    .filter-arrow-left  { margin-left: 12px; margin-right: 4px; }
    .filter-arrow-right { margin-right: 12px; margin-left: 4px; }
    .filter-row {
      display: flex; gap: 8px;
      overflow-x: auto; scroll-behavior: smooth;
      scrollbar-width: none; flex: 1;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 100px;
      background: var(--surface);
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.06);
      transition: background 0.2s, color 0.2s;
    }
    .filter-chip.active { background: var(--accent); color: #fff; }
    .dream-count { font-size: 13px; color: var(--text-muted); padding: 0 20px 10px; }
    .dream-card { cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
    .dream-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .dream-card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .dream-view-btn {
      font-size: 12px; font-weight: 700; color: var(--accent-soft);
      text-decoration: none; letter-spacing: 0.03em;
      padding: 4px 10px; border-radius: 100px;
      border: 1px solid rgba(155,93,229,0.3);
      transition: background 0.2s, color 0.2s;
    }
    .dream-view-btn:hover { background: var(--accent-soft); color: #fff; }
    .search-wrap {
      position: relative;
      margin: 0 20px 4px;
    }
    .search-wrap input {
      width: 100%;
      box-sizing: border-box;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 14px 10px 38px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
    }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus { outline: none; border-color: var(--accent-soft); box-shadow: 0 0 0 3px var(--accent-glow); }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 14px; pointer-events: none;
      color: var(--text-muted);
    }

    .pattern-card {
      margin: 0 0 16px;
      background: linear-gradient(135deg, rgba(124,58,237,0.12), rgba(155,93,229,0.06));
      border: 1px solid rgba(155,93,229,0.25);
      border-radius: 18px; padding: 18px 18px 16px;
    }
    .pattern-card-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px;
    }
    .pattern-card-title {
      font-family: 'Nunito', sans-serif; font-weight: 800;
      font-size: 15px; color: var(--text);
    }
    .pattern-pill {
      font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--accent-soft); background: rgba(155,93,229,0.15);
      padding: 3px 9px; border-radius: 100px;
    }
    .pattern-narrative {
      font-size: 14px; color: var(--text-dim); line-height: 1.65; margin: 10px 0 12px;
    }
    .pattern-insight {
      font-size: 13px; color: var(--text-muted); font-style: italic; line-height: 1.6;
      border-left: 2px solid rgba(155,93,229,0.4); padding-left: 12px; margin-bottom: 12px;
    }
    .pattern-section-label {
      font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 6px;
    }
    .pattern-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .pattern-chip-item {
      font-size: 12.5px; padding: 4px 11px; border-radius: 100px;
      background: rgba(255,255,255,0.06); color: var(--text-dim);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .pattern-reflections { list-style: none; padding: 0; margin: 0; }
    .pattern-reflections li {
      font-size: 13px; color: var(--text-dim); line-height: 1.6;
      padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .pattern-reflections li:last-child { border-bottom: none; }
    .pattern-reflections li::before { content: "✦ "; opacity: 0.4; }
  </style>
</head>
<body>
  <div class="app-frame">

    <div class="page-header">📚 Dream Library</div>

    <!-- FILTER CHIPS -->
    <div class="filter-wrapper">
      <button class="filter-arrow filter-arrow-left hidden" id="filter-prev" aria-label="Scroll left">&#8249;</button>
      <div class="filter-row" id="filter-row">
        <div class="filter-chip active">All</div>
        <div class="filter-chip">Anxiety</div>
        <div class="filter-chip">Wonder</div>
        <div class="filter-chip">Joy</div>
        <div class="filter-chip">Peaceful</div>
        <div class="filter-chip">Fear</div>
      </div>
      <button class="filter-arrow filter-arrow-right" id="filter-next" aria-label="Scroll right">&#8250;</button>
    </div>

    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="dream-search" placeholder="Search dreams, themes, emotions…" autocomplete="off" />
    </div>

    <div class="main-content page-content">
      <div id="pattern-banner"></div>

      <div class="dream-count" id="dream-count"></div>

      <div id="dream-list">
        <div style="text-align:center; padding:40px 0; color:var(--text-dim); font-size:14px;">Loading dreams...</div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <div class="nav-group">
        <a class="nav-link" href="../index.html">Home</a>
        <a class="nav-link active" href="dreams.html">Dreams</a>
      </div>
      <a class="nav-plus" href="journal.html">+</a>
      <div class="nav-group">
        <a class="nav-link" href="winddown.html">Wind Down</a>
        <a class="nav-link" href="profile.html">Profile</a>
      </div>
    </nav>

  </div>

  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getDreams } from '../js/firebase.js';

    const emotionTags = {
      wonder: 'tag-wonder', anxiety: 'tag-anxiety', joy: 'tag-joy',
      fear: 'tag-fear', peaceful: 'tag-peaceful', sadness: 'tag-sadness',
      excitement: 'tag-excitement', nostalgia: 'tag-nostalgia', confusion: 'tag-confusion',
      hope: 'tag-hope', longing: 'tag-longing', dread: 'tag-dread',
      awe: 'tag-awe', grief: 'tag-grief', frustration: 'tag-frustration',
      tenderness: 'tag-tenderness', shame: 'tag-shame', pride: 'tag-pride',
      restlessness: 'tag-restlessness', relief: 'tag-relief',
    };

    function formatDate(ts) {
      const date = ts?.toDate ? ts.toDate() : new Date(ts);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    let allDreams     = [];
    let activeFilter  = null;
    let searchQuery   = '';

    function getFiltered() {
      let result = allDreams;
      if (activeFilter) {
        result = result.filter(d => d.emotions?.map(e => e.toLowerCase()).includes(activeFilter));
      }
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        result = result.filter(d =>
          (d.text    || '').toLowerCase().includes(q) ||
          (d.summary || '').toLowerCase().includes(q) ||
          (d.emotions || []).some(e => e.toLowerCase().includes(q)) ||
          (d.themes   || []).some(t => t.toLowerCase().includes(q))
        );
      }
      return result;
    }

    function renderDreams() {
      const list     = document.getElementById('dream-list');
      const filtered = getFiltered();

      if (allDreams.length === 0) {
        list.innerHTML = `
          <div style="text-align:center; padding:40px 20px; color:var(--text-dim);">
            <div style="font-size:40px; margin-bottom:12px;">🌙</div>
            <div style="font-size:16px; margin-bottom:8px;">No dreams logged yet</div>
            <div style="font-size:14px;">Tap + to log your first dream</div>
          </div>`;
        return;
      }

      if (filtered.length === 0) {
        list.innerHTML = `<div style="text-align:center; padding:30px 20px; color:var(--text-dim); font-size:14px;">No ${filter} dreams found.</div>`;
        return;
      }

      const cards = filtered.map(dream => {
        const preview = (dream.text || '').length > 120 ? dream.text.slice(0, 120) + '...' : (dream.text || '');
        const tags    = (dream.emotions || []).map(e => {
          const cls = emotionTags[e.toLowerCase()] || '';
          return `<span class="tag ${cls}">${e}</span>`;
        }).join('');
        return `
          <div class="dream-card" onclick="window.location.href='dream.html?id=${dream.id}'">
            <div class="dream-date">${formatDate(dream.createdAt)}</div>
            <div class="dream-preview">${preview}</div>
            <div class="dream-card-footer">
              <div>${tags}</div>
              <a class="dream-view-btn" href="dream.html?id=${dream.id}" onclick="event.stopPropagation()">View →</a>
            </div>
          </div>`;
      }).join('');

      const count = filtered.length;
      document.getElementById('dream-count').textContent =
        `${count} dream${count !== 1 ? 's' : ''}${activeFilter || searchQuery ? ' found' : ' logged'}`;

      list.innerHTML = cards;
      renderPatternBanner();
    }

    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        const label = chip.textContent.trim();
        activeFilter = label === 'All' ? null : label.toLowerCase();
        renderDreams();
      });
    });

    document.getElementById('dream-search').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      renderDreams();
    });

    const filterRow  = document.getElementById('filter-row');
    const btnPrev    = document.getElementById('filter-prev');
    const btnNext    = document.getElementById('filter-next');
    const SCROLL_AMT = 120;

    function updateArrows() {
      btnPrev.classList.toggle('hidden', filterRow.scrollLeft <= 0);
      btnNext.classList.toggle('hidden', filterRow.scrollLeft + filterRow.clientWidth >= filterRow.scrollWidth - 2);
    }

    btnPrev.addEventListener('click', () => { filterRow.scrollLeft -= SCROLL_AMT; });
    btnNext.addEventListener('click', () => { filterRow.scrollLeft += SCROLL_AMT; });
    filterRow.addEventListener('scroll', updateArrows, { passive: true });
    updateArrows();

    const PATTERN_MIN = 5;
    let patternGenerated = false;

    function renderPatternBanner() {
      const banner = document.getElementById('pattern-banner');
      if (!banner) return;

      if (allDreams.length < PATTERN_MIN) {
        const remaining = PATTERN_MIN - allDreams.length;
        banner.innerHTML = `
          <div class="pattern-card">
            <div class="pattern-card-header">
              <div class="pattern-card-title">✨ Pattern Report</div>
              <div class="pattern-pill">${allDreams.length} / ${PATTERN_MIN}</div>
            </div>
            <div class="pattern-narrative" style="margin-bottom:0;">
              Log ${remaining} more dream${remaining !== 1 ? 's' : ''} to unlock your AI pattern report — a deep look at what your subconscious keeps returning to.
            </div>
          </div>`;
        return;
      }

      if (!patternGenerated) {
        banner.innerHTML = `
          <div class="pattern-card">
            <div class="pattern-card-header">
              <div class="pattern-card-title">✨ Pattern Report</div>
              <div class="pattern-pill">${allDreams.length} dreams</div>
            </div>
            <div class="pattern-narrative" style="margin-bottom:12px;">
              Reverie can now analyse patterns across all your dreams — recurring emotions, symbols, and what your subconscious keeps returning to.
            </div>
            <button class="btn btn-primary" style="width:100%;" onclick="generatePatternReport()">Generate My Pattern Report</button>
          </div>`;
      }
    }

    async function generatePatternReport() {
      const banner = document.getElementById('pattern-banner');
      banner.innerHTML = `
        <div class="pattern-card" style="text-align:center; padding:28px 18px;">
          <div class="spinner" style="margin:0 auto 12px;"></div>
          <div style="font-size:13px; color:var(--text-muted);">Analysing your dreams…</div>
        </div>`;

      try {
        const compressed = allDreams.map(d => ({
          date:     formatDate(d.createdAt),
          emotions: d.emotions || [],
          themes:   d.themes   || [],
          summary:  d.summary  || '',
        }));

        const report = await getPatternReport(compressed);
        patternGenerated = true;
        renderReport(report);
      } catch (err) {
        banner.innerHTML = `
          <div class="pattern-card">
            <div class="pattern-card-header"><div class="pattern-card-title">✨ Pattern Report</div></div>
            <div class="pattern-narrative" style="color:var(--text-muted); margin-bottom:10px;">Couldn't generate report. Please try again.</div>
            <button class="btn btn-ghost" style="width:100%;" onclick="generatePatternReport()">Retry</button>
          </div>`;
      }
    }

    function renderReport(report) {
      const banner = document.getElementById('pattern-banner');
      const emotionsHtml  = (report.top_emotions  || []).map(e => `<span class="pattern-chip-item">${e}</span>`).join('');
      const themesHtml    = (report.recurring_themes || []).map(t => `<span class="pattern-chip-item">${t}</span>`).join('');
      const reflectHtml   = (report.reflections    || []).map(r => `<li>${r}</li>`).join('');

      banner.innerHTML = `
        <div class="pattern-card">
          <div class="pattern-card-header">
            <div class="pattern-card-title">✨ Pattern Report</div>
            <button style="background:none;border:none;color:var(--text-muted);font-size:12px;cursor:pointer;padding:2px 6px;" onclick="resetPatternReport()">Refresh</button>
          </div>
          <div class="pattern-narrative">${report.narrative}</div>
          <div class="pattern-insight">${report.insight}</div>
          <div class="pattern-section-label">Top emotions</div>
          <div class="pattern-chips">${emotionsHtml}</div>
          <div class="pattern-section-label">Recurring themes</div>
          <div class="pattern-chips" style="margin-bottom:14px;">${themesHtml}</div>
          <div class="pattern-section-label">Reflect on this</div>
          <ul class="pattern-reflections">${reflectHtml}</ul>
        </div>`;
    }

    function resetPatternReport() {
      patternGenerated = false;
      renderPatternBanner();
    }

    window.generatePatternReport = generatePatternReport;
    window.resetPatternReport    = resetPatternReport;

    requireAuth(async user => {
      allDreams = await getDreams(user.uid);
      renderDreams();
    });
  </script>
</body>
</html>
