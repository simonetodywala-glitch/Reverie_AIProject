<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Reverie — Dreams</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .filter-wrapper { position: relative; display: flex; align-items: center; padding: 0 0 16px; }
    .filter-arrow {
      flex-shrink: 0;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-dim);
      transition: background 0.2s, color 0.2s;
      z-index: 1;
      user-select: none;
    }
    .filter-arrow:hover { background: var(--accent-soft); color: #fff; }
    .filter-arrow.hidden { opacity: 0; pointer-events: none; }
    .filter-arrow-left  { margin-left: 12px; margin-right: 4px; }
    .filter-arrow-right { margin-right: 12px; margin-left: 4px; }
    .filter-row {
      display: flex; gap: 8px;
      overflow-x: auto; scroll-behavior: smooth;
      scrollbar-width: none; flex: 1;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-chip {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 100px;
      background: var(--surface);
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.06);
      transition: background 0.2s, color 0.2s;
    }
    .filter-chip.active { background: var(--accent); color: #fff; }
    .dream-count { font-size: 13px; color: var(--text-muted); padding: 0 20px 10px; }
    .dream-card { cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
    .dream-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .dream-card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .dream-view-btn {
      font-size: 12px; font-weight: 700; color: var(--accent-soft);
      text-decoration: none; letter-spacing: 0.03em;
      padding: 4px 10px; border-radius: 100px;
      border: 1px solid rgba(155,93,229,0.3);
      transition: background 0.2s, color 0.2s;
    }
    .dream-view-btn:hover { background: var(--accent-soft); color: #fff; }
  </style>
</head>
<body>
  <div class="app-frame">

    <div class="page-header">📚 Dream Library</div>

    <!-- FILTER CHIPS -->
    <div class="filter-wrapper">
      <button class="filter-arrow filter-arrow-left hidden" id="filter-prev" aria-label="Scroll left">&#8249;</button>
      <div class="filter-row" id="filter-row">
        <div class="filter-chip active">All</div>
        <div class="filter-chip">Anxiety</div>
        <div class="filter-chip">Wonder</div>
        <div class="filter-chip">Joy</div>
        <div class="filter-chip">Peaceful</div>
        <div class="filter-chip">Fear</div>
      </div>
      <button class="filter-arrow filter-arrow-right" id="filter-next" aria-label="Scroll right">&#8250;</button>
    </div>

    <div class="main-content page-content">
      <div class="dream-count" id="dream-count">3 dreams logged</div>

      <div id="dream-list">
        <div style="text-align:center; padding:40px 0; color:var(--text-dim); font-size:14px;">Loading dreams...</div>
      </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <div class="nav-group">
        <a class="nav-link" href="../index.html">Home</a>
        <a class="nav-link active" href="dreams.html">Dreams</a>
      </div>
      <a class="nav-plus" href="journal.html">+</a>
      <div class="nav-group">
        <a class="nav-link" href="winddown.html">Wind Down</a>
        <a class="nav-link" href="profile.html">Profile</a>
      </div>
    </nav>

  </div>

  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script type="module">
    import { requireAuth } from '../js/auth.js';
    import { getDreams } from '../js/firebase.js';

    const emotionTags = {
      wonder: 'tag-wonder', anxiety: 'tag-anxiety', joy: 'tag-joy',
      fear: 'tag-fear', peaceful: 'tag-peaceful', sadness: 'tag-sadness',
      excitement: 'tag-excitement', nostalgia: 'tag-nostalgia', confusion: 'tag-confusion',
      hope: 'tag-hope', longing: 'tag-longing', dread: 'tag-dread',
      awe: 'tag-awe', grief: 'tag-grief', frustration: 'tag-frustration',
      tenderness: 'tag-tenderness', shame: 'tag-shame', pride: 'tag-pride',
      restlessness: 'tag-restlessness', relief: 'tag-relief',
    };

    function formatDate(ts) {
      const date = ts?.toDate ? ts.toDate() : new Date(ts);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    let allDreams = [];

    function renderDreams(filter) {
      const list     = document.getElementById('dream-list');
      const filtered = filter
        ? allDreams.filter(d => d.emotions?.map(e => e.toLowerCase()).includes(filter))
        : allDreams;

      if (allDreams.length === 0) {
        list.innerHTML = `
          <div style="text-align:center; padding:40px 20px; color:var(--text-dim);">
            <div style="font-size:40px; margin-bottom:12px;">🌙</div>
            <div style="font-size:16px; margin-bottom:8px;">No dreams logged yet</div>
            <div style="font-size:14px;">Tap + to log your first dream</div>
          </div>`;
        return;
      }

      if (filtered.length === 0) {
        list.innerHTML = `<div style="text-align:center; padding:30px 20px; color:var(--text-dim); font-size:14px;">No ${filter} dreams found.</div>`;
        return;
      }

      const cards = filtered.map(dream => {
        const preview = (dream.text || '').length > 120 ? dream.text.slice(0, 120) + '...' : (dream.text || '');
        const tags    = (dream.emotions || []).map(e => {
          const cls = emotionTags[e.toLowerCase()] || '';
          return `<span class="tag ${cls}">${e}</span>`;
        }).join('');
        return `
          <div class="dream-card" onclick="window.location.href='dream.html?id=${dream.id}'">
            <div class="dream-date">${formatDate(dream.createdAt)}</div>
            <div class="dream-preview">${preview}</div>
            <div class="dream-card-footer">
              <div>${tags}</div>
              <a class="dream-view-btn" href="dream.html?id=${dream.id}" onclick="event.stopPropagation()">View →</a>
            </div>
          </div>`;
      }).join('');

      const remaining = 5 - allDreams.length;
      const teaser = allDreams.length < 5
        ? `<div class="ai-response" style="margin-top:8px;">
            <div class="ai-label">✨ Pattern Report unlocks at 5 dreams</div>
            <div class="ai-text" style="font-size:14px;">Log ${remaining} more dream${remaining !== 1 ? 's' : ''} to unlock your AI pattern analysis.</div>
          </div>`
        : '';

      list.innerHTML = cards + teaser;
    }

    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        const label = chip.textContent.trim();
        renderDreams(label === 'All' ? null : label.toLowerCase());
      });
    });

    const filterRow  = document.getElementById('filter-row');
    const btnPrev    = document.getElementById('filter-prev');
    const btnNext    = document.getElementById('filter-next');
    const SCROLL_AMT = 120;

    function updateArrows() {
      btnPrev.classList.toggle('hidden', filterRow.scrollLeft <= 0);
      btnNext.classList.toggle('hidden', filterRow.scrollLeft + filterRow.clientWidth >= filterRow.scrollWidth - 2);
    }

    btnPrev.addEventListener('click', () => { filterRow.scrollLeft -= SCROLL_AMT; });
    btnNext.addEventListener('click', () => { filterRow.scrollLeft += SCROLL_AMT; });
    filterRow.addEventListener('scroll', updateArrows, { passive: true });
    updateArrows();

    requireAuth(async user => {
      allDreams = await getDreams(user.uid);
      document.getElementById('dream-count').textContent =
        `${allDreams.length} dream${allDreams.length !== 1 ? 's' : ''} logged`;
      renderDreams(null);
    });
  </script>
</body>
</html>
