<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    // Fast synchronous guard: brand-new users go to the landing page immediately,
    // before anything renders. Returning users wait for Firebase to confirm the session.
    if (!localStorage.getItem('reverie_onboarded')) {
      window.location.href = 'pages/onboarding.html';
    }
  </script>
  <style>
    /* Hide the dashboard until Firebase confirms the session, preventing a flash
       of the home screen for users whose session has expired. */
    body { opacity: 0; transition: opacity 0.25s ease; }
  </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Reverie — Home</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    /* ── STAR FIELD ── */
    #star-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    /* hide stars in morning mode */
    body.morning #star-canvas {
      opacity: 0;
    }

    /* make sure app content sits above stars */
    .app-frame {
      position: relative;
      z-index: 1;
    }

    /* ── SLEEP TRACKING ── */
    .orb {
      cursor: pointer;
      transition: transform 0.55s cubic-bezier(0.34, 1.4, 0.64, 1), opacity 0.4s ease !important;
    }
    .orb:active { transform: scale(0.94); }
    .orb.orb-winddown {
      animation: none !important;
      transform: translateY(52px) scale(0.84);
    }
    .orb.orb-sleeping {
      animation: none !important;
      transform: scale(0.72);
      opacity: 0.45;
    }

    .greeting-card {
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    .greeting-card.fade-out {
      opacity: 0;
      transform: translateY(-12px);
      pointer-events: none;
    }

    .winddown-prompt {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 4px 24px 12px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .winddown-prompt.open   { display: flex; }
    .winddown-prompt.shown  { opacity: 1; transform: translateY(0); }

    .winddown-prompt .wd-title {
      font-family: 'Nunito', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      text-align: center;
    }
    .winddown-prompt .wd-sub {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
    }
    .winddown-prompt .wd-actions {
      display: flex;
      gap: 10px;
      margin-top: 4px;
      width: 100%;
      max-width: 280px;
    }

    .sleep-active-banner {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 4px 24px 12px;
    }
    .sleep-active-banner.open { display: flex; }
    .sleep-active-banner .sa-label {
      font-size: 13px;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .sleep-active-banner .sa-time {
      font-family: 'Nunito', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
  </style>
</head>
<body>

  <!-- STAR CANVAS (night mode only) -->
  <canvas id="star-canvas"></canvas>

  <div class="app-frame">

    <!-- ORB + GREETING -->
    <div class="header-area">
      <div class="orb" id="orb" onclick="handleOrbClick()"></div>

      <div class="greeting-card" id="greeting-card">
        <h2 id="greeting-text">Good Night!</h2>
      </div>

      <!-- WIND-DOWN PROMPT (shown when orb tapped) -->
      <div class="winddown-prompt" id="winddown-prompt">
        <div class="wd-title">Ready to wind down?</div>
        <div class="wd-sub">Reverie will track how long you sleep.</div>
        <div class="wd-actions">
          <button class="btn btn-primary" style="flex:1;" onclick="startSleep()">Yes, let's go</button>
          <button class="btn btn-ghost" style="width:44px;" onclick="cancelWinddown()">✕</button>
        </div>
      </div>

      <!-- SLEEPING STATE (shown when session is active) -->
      <div class="sleep-active-banner" id="sleep-active-banner">
        <div class="sa-label">Sleeping since</div>
        <div class="sa-time" id="sleep-since-time">—</div>
        <button class="btn btn-primary" style="margin-top:4px; min-width:180px;" onclick="logWakeUp()">I'm awake ☀️</button>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content page-content">

      <div class="section-label">Sleep Schedule</div>

      <!-- SLEEP SCHEDULE CARD -->
      <div class="card" id="sleep-card">
        <div style="text-align:center; padding:4px 0; color:var(--text-muted); font-size:14px;">Loading...</div>
      </div>

      <!-- DREAMS + STREAK -->
      <div class="two-col" style="margin-top:12px;">
        <div class="card">
          <div class="card-title" style="font-size:16px;">Dreams</div>
          <div class="card-value" style="font-size:26px;" id="dream-count">—</div>
          <div class="card-sub">logged</div>
        </div>
        <div class="card">
          <div class="card-title" style="font-size:16px;">Streak</div>
          <div class="card-value" style="font-size:26px;" id="streak">—</div>
          <div class="card-sub" id="streak-unit">nights</div>
        </div>
      </div>

      <!-- RECENT DREAMS PREVIEW -->
      <div class="section-label" style="margin-top:8px;">Recent Dreams</div>
      <div id="recent-dreams">
        <div class="card" style="text-align:center; color:var(--text-muted); font-size:14px; padding:20px;">Loading...</div>
      </div>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <div class="nav-group">
        <a class="nav-link active" href="index.html">Home</a>
        <a class="nav-link" href="pages/dreams.html">Dreams</a>
      </div>
      <a class="nav-plus" href="pages/journal.html" title="Log a dream">+</a>
      <div class="nav-group">
        <a class="nav-link" href="pages/winddown.html">Wind Down</a>
        <a class="nav-link" href="pages/profile.html">Profile</a>
      </div>
    </nav>

  </div>

  <script src="js/app.js"></script>
  <script src="js/api.js"></script>

  <script type="module">
    import { requireAuth }                                      from './js/auth.js';
    import { getDreams, getLatestSleepSchedule, getUserProfile } from './js/firebase.js';

    const emotionTagMap = {
      wonder: 'tag-wonder', anxiety: 'tag-anxiety', joy: 'tag-joy',
      fear: 'tag-fear', peaceful: 'tag-peaceful', sadness: 'tag-sadness',
      excitement: 'tag-excitement', nostalgia: 'tag-nostalgia', confusion: 'tag-confusion',
      hope: 'tag-hope', longing: 'tag-longing', dread: 'tag-dread',
      awe: 'tag-awe', grief: 'tag-grief', frustration: 'tag-frustration',
      tenderness: 'tag-tenderness', shame: 'tag-shame', pride: 'tag-pride',
      restlessness: 'tag-restlessness', relief: 'tag-relief',
    };

    function fmt12h(t) {
      if (!t) return '—';
      const [h, m] = t.split(':').map(Number);
      return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${h < 12 ? 'AM' : 'PM'}`;
    }

    function formatDate(ts) {
      if (!ts) return '';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function calcStreak(dreams) {
      if (!dreams.length) return 0;
      const days = new Set(dreams.map(d => {
        const date = d.createdAt?.toDate ? d.createdAt.toDate() : new Date(d.createdAt || 0);
        return date.toISOString().split('T')[0];
      }));
      let streak = 0;
      const cursor = new Date();
      cursor.setHours(0, 0, 0, 0);
      while (days.has(cursor.toISOString().split('T')[0])) {
        streak++;
        cursor.setDate(cursor.getDate() - 1);
      }
      return streak;
    }

    requireAuth(async user => {
      document.body.style.opacity = '1';

      const [dreams, schedule, profile] = await Promise.all([
        getDreams(user.uid).catch(() => []),
        getLatestSleepSchedule(user.uid).catch(() => null),
        getUserProfile(user.uid).catch(() => null),
      ]);

      // ── Greeting ──
      const raw = (user.displayName || profile?.name || '').split(' ')[0];
      const firstName = raw.charAt(0).toUpperCase() + raw.slice(1).toLowerCase();
      const greetingEl = document.getElementById('greeting-text');
      if (greetingEl && firstName) {
        const isMorning = new Date().getHours() >= 6 && new Date().getHours() < 18;
        greetingEl.textContent = `${isMorning ? 'Good Morning' : 'Good Night'} ${firstName}!`;
      }

      // ── Sleep Schedule card ──
      const sleepCard = document.getElementById('sleep-card');
      if (schedule?.bedtime) {
        sleepCard.innerHTML = `
          <div class="card-title">Target Schedule</div>
          <div class="card-value" id="sleep-duration">${schedule.targetSleepHours ?? '—'}h</div>
          <div class="card-sub">Bedtime ${fmt12h(schedule.bedtime)} · Wake ${fmt12h(schedule.wakeTime)}</div>`;
      } else {
        sleepCard.innerHTML = `
          <div style="text-align:center; padding:4px 0;">
            <div style="color:var(--text-muted); font-size:14px; margin-bottom:8px;">No sleep schedule yet</div>
            <a href="pages/profile.html" style="color:var(--accent-soft); font-size:13px; text-decoration:none;">Set one up in Profile →</a>
          </div>`;
      }

      // ── Dream count + streak ──
      document.getElementById('dream-count').textContent = dreams.length;
      const streak = calcStreak(dreams);
      document.getElementById('streak').textContent = streak;
      document.getElementById('streak-unit').textContent = streak === 1 ? 'night' : 'nights';

      // ── Recent dreams ──
      const container = document.getElementById('recent-dreams');
      if (!dreams.length) {
        container.innerHTML = `<div class="card" style="text-align:center; color:var(--text-muted); font-size:14px; padding:20px;">No dreams logged yet.<br><a href="pages/journal.html" style="color:var(--accent-soft); text-decoration:none;">Log your first dream →</a></div>`;
        return;
      }
      container.innerHTML = dreams.slice(0, 2).map(d => {
        const tags = (d.emotions || []).slice(0, 3).map(e => {
          const cls = emotionTagMap[e.toLowerCase()] || '';
          return `<span class="tag ${cls}">${e}</span>`;
        }).join('');
        const preview = (d.text || d.summary || '').slice(0, 80) + ((d.text || '').length > 80 ? '…' : '');
        return `<div class="dream-card" onclick="window.location.href='pages/dream.html?id=${d.id}'" style="cursor:pointer;">
          <div class="dream-date">${formatDate(d.createdAt)}</div>
          <div class="dream-preview">${preview}</div>
          <div>${tags}</div>
        </div>`;
      }).join('');
    });
  </script>

  <script>
    // ── SLEEP TRACKING ──
    let winddownOpen = false;

    function handleOrbClick() {
      if (localStorage.getItem('reverie_sleep_start')) return;
      if (winddownOpen) { cancelWinddown(); return; }
      showWinddown();
    }

    function showWinddown() {
      winddownOpen = true;
      document.getElementById('greeting-card').classList.add('fade-out');
      document.getElementById('orb').classList.add('orb-winddown');
      const prompt = document.getElementById('winddown-prompt');
      prompt.classList.add('open');
      requestAnimationFrame(() => requestAnimationFrame(() => prompt.classList.add('shown')));
    }

    function cancelWinddown() {
      winddownOpen = false;
      const prompt = document.getElementById('winddown-prompt');
      prompt.classList.remove('shown');
      document.getElementById('orb').classList.remove('orb-winddown');
      setTimeout(() => {
        prompt.classList.remove('open');
        document.getElementById('greeting-card').classList.remove('fade-out');
      }, 300);
    }

    function startSleep() {
      const now = new Date();
      localStorage.setItem('reverie_sleep_start', now.toISOString());
      document.getElementById('winddown-prompt').classList.remove('open', 'shown');
      applySleepingState(now);
      winddownOpen = false;
    }

    function applySleepingState(startTime) {
      const orb = document.getElementById('orb');
      orb.classList.remove('orb-winddown');
      orb.classList.add('orb-sleeping');
      document.getElementById('greeting-card').classList.add('fade-out');
      const timeStr = startTime.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
      document.getElementById('sleep-since-time').textContent = timeStr;
      document.getElementById('sleep-active-banner').classList.add('open');
    }

    function logWakeUp() {
      const raw = localStorage.getItem('reverie_sleep_start');
      if (!raw) return;
      const start    = new Date(raw);
      const end      = new Date();
      const totalMin = Math.round((end - start) / 60000);
      const hours    = Math.floor(totalMin / 60);
      const mins     = totalMin % 60;
      localStorage.removeItem('reverie_sleep_start');

      // Store duration for the journal/insights page to use
      localStorage.setItem('reverie_last_sleep', JSON.stringify({
        start: raw, end: end.toISOString(), hours, mins
      }));

      // Reset UI
      const orb = document.getElementById('orb');
      orb.classList.remove('orb-sleeping');
      document.getElementById('sleep-active-banner').classList.remove('open');
      document.getElementById('greeting-card').classList.remove('fade-out');

      // Show summary briefly, then prompt to journal
      const banner = document.getElementById('sleep-active-banner');
      banner.innerHTML = `
        <div class="sa-label">You slept</div>
        <div class="sa-time">${hours}h ${mins}m</div>
        <button class="btn btn-primary" style="margin-top:4px; min-width:180px;"
          onclick="document.getElementById('sleep-active-banner').classList.remove('open'); window.location.href='pages/journal.html'">
          Log a dream 🌙
        </button>`;
      banner.classList.add('open');
    }

    // On load: restore sleeping state if session is active
    (function () {
      const raw = localStorage.getItem('reverie_sleep_start');
      if (raw) applySleepingState(new Date(raw));
    })();
  </script>

  <script>
    // ── STAR FIELD ──
    // Uses a canvas so stars sit behind everything cleanly
    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');

    let stars = [];

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function createStars(count = 160) {
      stars = [];
      for (let i = 0; i < count; i++) {
        stars.push({
          x:       Math.random() * canvas.width,
          y:       Math.random() * canvas.height,
          r:       Math.random() * 1.4 + 0.3,          // radius 0.3–1.7px
          opacity: Math.random() * 0.5 + 0.1,          // base opacity
          speed:   Math.random() * 0.008 + 0.003,       // twinkle speed
          phase:   Math.random() * Math.PI * 2,         // twinkle offset
        });
      }
    }

    function drawStars(timestamp) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      stars.forEach(s => {
        // Twinkle: sine wave on opacity
        const twinkle = Math.sin(timestamp * s.speed + s.phase);
        const alpha   = s.opacity + twinkle * 0.25;

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, alpha)})`;
        ctx.fill();
      });

      requestAnimationFrame(drawStars);
    }

    resizeCanvas();
    createStars();
    requestAnimationFrame(drawStars);

    window.addEventListener('resize', () => {
      resizeCanvas();
      createStars();
    });
  </script>

</body>
</html>
