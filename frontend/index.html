<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    // Check if the user has NOT completed onboarding
    if (!localStorage.getItem('reverie_onboarded')) {
      // Send them straight to the onboarding page
        window.location.href = 'pages/onboarding.html';
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Reverie — Home</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    /* ── STAR FIELD ── */
    #star-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }

    /* hide stars in morning mode */
    body.morning #star-canvas {
      opacity: 0;
    }

    /* make sure app content sits above stars */
    .app-frame {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>

  <!-- STAR CANVAS (night mode only) -->
  <canvas id="star-canvas"></canvas>

  <div class="app-frame">

    <!-- ORB + GREETING -->
    <div class="header-area">
      <div class="orb"></div>
      <div class="greeting-card">
        <h2 id="greeting-text">Good Night Gemmy!</h2>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content page-content">

      <div class="section-label">Last Night</div>

      <!-- SLEEP QUALITY CARD -->
      <div class="card">
        <div class="card-title">Sleep Quality</div>
        <div class="card-value" id="sleep-duration">7h 22m</div>
        <div class="card-sub" id="sleep-times">Bedtime 11:04pm · Woke 6:26 am</div>
      </div>

      <!-- SLEEP DEBT + STREAK -->
      <div class="two-col">
        <div class="card">
          <div class="card-title" style="font-size:16px;">Sleep Debt</div>
          <div class="card-value" style="font-size:26px;" id="sleep-debt">1.5 hrs</div>
        </div>
        <div class="card">
          <div class="card-title" style="font-size:16px;">Streak</div>
          <div class="card-value" style="font-size:26px;" id="streak">4 nights</div>
        </div>
      </div>

      <!-- RECENT DREAMS PREVIEW -->
      <div class="section-label" style="margin-top:8px;">Recent Dreams</div>
      <div id="recent-dreams">
        <div class="dream-card" onclick="window.location.href='pages/dreams.html'">
          <div class="dream-date">Today · Anxious · Wonder</div>
          <div class="dream-preview">Flying over a glass city, but kept falling through the buildings...</div>
          <div>
            <span class="tag tag-anxiety">anxiety</span>
            <span class="tag tag-wonder">wonder</span>
          </div>
        </div>
      </div>

    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <div class="nav-group">
        <a class="nav-link active" href="index.html">Home</a>
        <a class="nav-link" href="pages/dreams.html">Dreams</a>
      </div>
      <a class="nav-plus" href="pages/journal.html" title="Log a dream">+</a>
      <div class="nav-group">
        <a class="nav-link" href="pages/winddown.html">Wind Down</a>
        <a class="nav-link" href="pages/profile.html">Profile</a>
      </div>
    </nav>

  </div>

  <script src="js/app.js"></script>
  <script src="js/api.js"></script>
  <script src="js/firebase.js"></script>

  <script>
    // ── STAR FIELD ──
    // Uses a canvas so stars sit behind everything cleanly
    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');

    let stars = [];

    function resizeCanvas() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function createStars(count = 160) {
      stars = [];
      for (let i = 0; i < count; i++) {
        stars.push({
          x:       Math.random() * canvas.width,
          y:       Math.random() * canvas.height,
          r:       Math.random() * 1.4 + 0.3,          // radius 0.3–1.7px
          opacity: Math.random() * 0.5 + 0.1,          // base opacity
          speed:   Math.random() * 0.008 + 0.003,       // twinkle speed
          phase:   Math.random() * Math.PI * 2,         // twinkle offset
        });
      }
    }

    function drawStars(timestamp) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      stars.forEach(s => {
        // Twinkle: sine wave on opacity
        const twinkle = Math.sin(timestamp * s.speed + s.phase);
        const alpha   = s.opacity + twinkle * 0.25;

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, alpha)})`;
        ctx.fill();
      });

      requestAnimationFrame(drawStars);
    }

    resizeCanvas();
    createStars();
    requestAnimationFrame(drawStars);

    window.addEventListener('resize', () => {
      resizeCanvas();
      createStars();
    });
  </script>

</body>
</html>
