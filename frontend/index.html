<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    if (!localStorage.getItem('reverie_onboarded')) {
      window.location.href = 'pages/onboarding.html';
    }
  </script>
  <style>body { opacity: 0; transition: opacity 0.25s ease; }</style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#17141e">
  <title>Reverie — Home</title>
  <link rel="stylesheet" href="css/v2-colors.css">
  <link rel="stylesheet" href="css/v2-components.css">
</head>
<body>

<div class="app">

  <!-- HEADER: moon + greeting -->
  <div class="head">
    <div class="moon-wrapper" id="moon-wrapper" onclick="handleMoonClick()">
      <div class="moon" id="moon"></div>
    </div>
    <p class="onBackgroundText" id="greeting-text">Good evening</p>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content" id="content">

    <!-- Sleep active banner (shown while tracking sleep) -->
    <div class="sleep-banner" id="sleep-banner">
      <div class="sleep-banner-label">Sleeping since</div>
      <div class="sleep-banner-time" id="sleep-since-time">—</div>
      <button class="btn-accent" style="width:180px; margin-top:4px;" onclick="logWakeUp()">I'm awake ☀️</button>
    </div>

    <!-- Latest dream hero card -->
    <div id="dream-hero"></div>

    <!-- Wind-down routine shortcut -->
    <div class="fullmetric" onclick="window.location.href='pages/winddown.html'">
      <div class="full-text">
        <h2 class="full-title">Wind-down routine</h2>
        <p class="full-content">Personalized for tonight</p>
      </div>
      <div class="full-button">→</div>
    </div>

    <!-- Dream count + streak -->
    <div class="halfcontainer">
      <div class="halfmetric" onclick="window.location.href='pages/dreams.html'">
        <p class="half-title">Dreams</p>
        <p class="half-content" id="dream-count">—</p>
      </div>
      <div class="halfmetric">
        <p class="half-title">Streak</p>
        <p class="half-content" id="streak-val">—</p>
      </div>
    </div>

    <!-- Sleep schedule card -->
    <div class="fullmetric" id="schedule-card" onclick="window.location.href='pages/profile.html'" style="display:none;">
      <div class="full-text">
        <h2 class="full-title" id="schedule-title">Sleep schedule</h2>
        <p class="full-content" id="schedule-sub">—</p>
      </div>
      <div class="full-button">→</div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-group">
      <a class="nav-link active" href="index.html">Home</a>
      <a class="nav-link" href="pages/dreams.html">Dreams</a>
    </div>
    <a class="nav-plus" href="pages/journal.html" title="Log a dream">+</a>
    <div class="nav-group">
      <a class="nav-link" href="pages/winddown.html">Wind Down</a>
      <a class="nav-link" href="pages/profile.html">Profile</a>
    </div>
  </nav>

</div>

<!-- SLEEP MODAL -->
<div id="sleep-modal" class="sleep-modal">
  <div class="sleep-modal-moon"></div>
  <div class="sleep-modal-card">
    <div class="sleep-modal-title" id="modal-title">Ready to wind down?</div>
    <div class="sleep-modal-sub" id="modal-sub">Reverie will track how long you sleep tonight.</div>
    <div class="sleep-modal-actions">
      <button class="btn-accent" id="modal-confirm" onclick="startSleep()">Yes, let's go</button>
      <button class="btn-ghost-sm" onclick="closeSleepModal()">✕</button>
    </div>
  </div>
</div>

<!-- MOON ANIMATION: once per session -->
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (!sessionStorage.getItem('moon-animated')) {
      document.getElementById('moon-wrapper').classList.add('animate');
      document.getElementById('moon').classList.add('animate');
      sessionStorage.setItem('moon-animated', true);
    } else {
      document.getElementById('moon').classList.add('animate');
    }
  });
</script>

<!-- SLEEP TRACKING -->
<script>
  const EMOTION_EMOJI = {
    wonder:'✨', anxiety:'😰', joy:'😊', fear:'😨', peaceful:'😌',
    sadness:'😢', excitement:'⚡', nostalgia:'🌅', confusion:'🌀',
    hope:'🌱', longing:'🌙', dread:'🌑', awe:'🌌', grief:'💧',
    tenderness:'🤍', restlessness:'🌊', relief:'🍃', pride:'🌟', shame:'🫥',
  };

  function handleMoonClick() {
    const sleeping = localStorage.getItem('reverie_sleep_start');
    if (sleeping) return;
    const isMorning = new Date().getHours() >= 6 && new Date().getHours() < 18;
    document.getElementById('modal-title').textContent = isMorning ? 'Good morning! ☀️' : 'Ready to wind down?';
    document.getElementById('modal-sub').textContent = isMorning
      ? 'Log last night\'s dream before it fades.'
      : 'Reverie will track how long you sleep tonight.';
    const btn = document.getElementById('modal-confirm');
    btn.textContent = isMorning ? 'Log a dream' : 'Yes, let\'s go';
    btn.onclick = isMorning ? () => window.location.href = 'pages/journal.html' : startSleep;
    setTimeout(() => document.getElementById('sleep-modal').classList.add('active'), 60);
  }

  function closeSleepModal() {
    document.getElementById('sleep-modal').classList.remove('active');
  }

  function startSleep() {
    const now = new Date();
    localStorage.setItem('reverie_sleep_start', now.toISOString());
    closeSleepModal();
    applySleepingState(now);
  }

  function applySleepingState(startTime) {
    const banner = document.getElementById('sleep-banner');
    banner.classList.add('open');
    const timeStr = startTime.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    document.getElementById('sleep-since-time').textContent = timeStr;
    const moon = document.getElementById('moon');
    moon.style.opacity = '0.45';
  }

  function logWakeUp() {
    const raw = localStorage.getItem('reverie_sleep_start');
    if (!raw) return;
    const start    = new Date(raw);
    const end      = new Date();
    const totalMin = Math.round((end - start) / 60000);
    const hours    = Math.floor(totalMin / 60);
    const mins     = totalMin % 60;
    localStorage.removeItem('reverie_sleep_start');
    localStorage.setItem('reverie_last_sleep', JSON.stringify({ start: raw, end: end.toISOString(), hours, mins }));

    const banner = document.getElementById('sleep-banner');
    banner.innerHTML = `
      <div class="sleep-banner-label">You slept</div>
      <div class="sleep-banner-time">${hours}h ${mins}m</div>
      <button class="btn-accent" style="width:200px; margin-top:4px;"
        onclick="document.getElementById('sleep-banner').classList.remove('open');
                 document.getElementById('moon').style.opacity='';
                 window.location.href='pages/journal.html'">
        Log a dream 🌙
      </button>`;

    document.getElementById('moon').style.opacity = '';
  }

  (function () {
    const raw = localStorage.getItem('reverie_sleep_start');
    if (raw) applySleepingState(new Date(raw));
  })();
</script>

<!-- FIREBASE DATA -->
<script type="module">
  import { requireAuth }                                        from './js/auth.js';
  import { getDreams, getLatestSleepSchedule, getUserProfile } from './js/firebase.js';

  function fmt12h(t) {
    if (!t) return '—';
    const [h, m] = t.split(':').map(Number);
    return `${h % 12 || 12}:${String(m).padStart(2,'0')} ${h < 12 ? 'AM' : 'PM'}`;
  }

  function formatDate(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }

  function calcStreak(dreams) {
    if (!dreams.length) return 0;
    const days = new Set(dreams.map(d => {
      const date = d.createdAt?.toDate ? d.createdAt.toDate() : new Date(d.createdAt || 0);
      return date.toISOString().split('T')[0];
    }));
    let streak = 0;
    const cursor = new Date();
    cursor.setHours(0, 0, 0, 0);
    while (days.has(cursor.toISOString().split('T')[0])) {
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    }
    return streak;
  }

  const EMOTION_EMOJI = {
    wonder:'✨', anxiety:'😰', joy:'😊', fear:'😨', peaceful:'😌',
    sadness:'😢', excitement:'⚡', nostalgia:'🌅', confusion:'🌀',
    hope:'🌱', longing:'🌙', dread:'🌑', awe:'🌌', grief:'💧',
    tenderness:'🤍', restlessness:'🌊', relief:'🍃', pride:'🌟', shame:'🫥',
  };

  function pickEmoji(emotions = []) {
    for (const e of emotions) {
      const em = EMOTION_EMOJI[e.toLowerCase()];
      if (em) return em;
    }
    return '🌙';
  }

  requireAuth(async user => {
    document.body.style.opacity = '1';

    const [dreams, schedule, profile] = await Promise.all([
      getDreams(user.uid).catch(() => []),
      getLatestSleepSchedule(user.uid).catch(() => null),
      getUserProfile(user.uid).catch(() => null),
    ]);

    // ── Greeting ──
    const rawName = (user.displayName || profile?.name || '').trim();
    const firstName = rawName ? rawName.split(' ')[0] : '';
    const hour = new Date().getHours();
    const timeGreet = hour < 12 ? 'Good morning' : hour < 18 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greeting-text').textContent = firstName
      ? `${timeGreet}, ${firstName}!`
      : `${timeGreet}!`;

    // ── Dream hero card ──
    const heroEl = document.getElementById('dream-hero');
    if (!dreams.length) {
      heroEl.innerHTML = `
        <div class="empty-hero">
          <div style="font-size:3rem">🌙</div>
          <p>No dreams logged yet.<br>Start tracking tonight's journey.</p>
          <button class="btn-accent" onclick="window.location.href='pages/journal.html'">Log your first dream</button>
        </div>`;
    } else {
      const latest = dreams[0];
      const emoji  = pickEmoji(latest.emotions || []);
      const title  = latest.summary?.split(' ').slice(0, 4).join(' ') || latest.text?.split(' ').slice(0, 4).join(' ') || 'Dream';
      const date   = formatDate(latest.createdAt);
      heroEl.innerHTML = `
        <div class="combohero">
          <div class="hero" onclick="window.location.href='pages/dream.html?id=${latest.id}'">
            <div class="combo-text">
              <p class="combo-title">Latest dream</p>
              <div class="combo-stats">
                <h1 class="combo-stat-large">${title}</h1>
                <p class="combo-stat-small">${date}</p>
              </div>
            </div>
            <div class="combo-icon">${emoji}</div>
          </div>
          <div class="combo-buttons">
            <button class="btn-surface" onclick="event.stopPropagation(); window.location.href='pages/dream.html?id=${latest.id}'">View</button>
            <button class="btn-accent" onclick="event.stopPropagation(); window.location.href='pages/dream.html?id=${latest.id}&chat=1'">Chat</button>
          </div>
        </div>`;
    }

    // ── Dream count + streak ──
    document.getElementById('dream-count').textContent = `${dreams.length} logged`;
    const streak = calcStreak(dreams);
    document.getElementById('streak-val').textContent = streak === 0
      ? 'Start tonight'
      : `${streak} ${streak === 1 ? 'night' : 'nights'}`;

    // ── Sleep schedule ──
    const schedCard = document.getElementById('schedule-card');
    if (schedule?.bedtime) {
      document.getElementById('schedule-title').textContent = `${schedule.targetSleepHours ?? '—'}h sleep`;
      document.getElementById('schedule-sub').textContent =
        `Bed ${fmt12h(schedule.bedtime)} · Wake ${fmt12h(schedule.wakeTime)}`;
      schedCard.style.display = 'flex';
    }
  });
</script>

</body>
</html>
